# Fuzzel Configuration - Material Dark Theme
# Compatible with fuzzel >= 1.9

[main]
# Window settings
width=32
lines=12
horizontal-pad=20
vertical-pad=12
inner-pad=8

# Font
font=MesloLGS NF:size=11

# Icons
icons-enabled=yes
icon-theme=Papirus-Dark

# Behavior
fuzzy=yes
show-actions=no
filter-desktop=no
dpi-aware=auto

# Prompt (empty for cleaner look)
prompt=› 

# Layer shell (Wayland)
layer=top
exit-on-keyboard-focus-loss=yes

[colors]
# Material Dark color scheme matching waybar
background=1e1e2eff
text=cdd6f4ff
match=89b4faff
selection=313244ff
selection-text=cdd6f4ff
border=89b4faff

[border]
width=2
radius=8

[dmenu]
mode=text
exit-immediately-if-empty=no
